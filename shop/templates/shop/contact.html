{% extends 'base.html'%}
{% load static %}

{% block main %}


<!-- Title page -->

<section class="bg-img1 txt-center p-lr-15 p-tb-92" style="background-image: url('{% static 'images/bg-01.jpg'%}');">
	<h2 class="ltext-105 cl0 txt-center">
		Contact
	</h2>
</section>

<!-- Content page -->
<section class="bg0 p-t-104 p-b-116">
	<div class="container">
		<div class="flex-w flex-tr">
			<div class="size-210 bor10 p-lr-70 p-t-55 p-b-70 p-lr-15-lg w-full-md">
				<form action="{% url 'contact' %}" method="post" name="sentMessage" id="contactForm"
					novalidate="novalidate">
					{% csrf_token %}
					<h4 class="mtext-105 cl2 txt-center p-b-30">
						Send Us A Message
					</h4>

					<div class="bor8 m-b-20 how-pos4-parent">
						<input class="stext-111 cl2 plh3 size-116 p-l-62 p-r-30" type="text"
							name="full_name" placeholder="Your Full-Name">
						<img class="how-pos4 pointer-none" style="width:20px"
							src="{%static 'images/icons/people.png'%}" alt="ICON">
					</div>
					<div class="bor8 m-b-20 how-pos4-parent">
						<input class="stext-111 cl2 plh3 size-116 p-l-62 p-r-30" type="email" name="email"
							placeholder="Your Email Address">
						<img class="how-pos4 pointer-none" src="{%static 'images/icons/icon-email.png'%}"
							alt="ICON">
					</div>
					<div class="bor8 m-b-30">
						<textarea class="stext-111 cl2 plh3 size-120 p-lr-28 p-tb-25" name="message"
							placeholder="How Can We Help?"></textarea>
					</div>

					<button type="submit"
						class="flex-c-m stext-101 cl0 size-121 bg3 bor1 hov-btn3 p-lr-15 trans-04 pointer">
						Submit
					</button>
				</form>
			</div>

			<div class="size-210 bor10 flex-w flex-col-m p-lr-93 p-tb-30 p-lr-15-lg w-full-md">
				<div class="flex-w w-full p-b-42">
					<span class="fs-18 cl5 txt-center size-211">
						<span class="lnr lnr-map-marker"></span>
					</span>

					<div class="size-212 p-t-2">
						<span class="mtext-110 cl2">
							Address
						</span>

						<p class="stext-115 cl6 size-213 p-t-18">
							41 Bunyodkor, Tashkent, Uzbekistan
						</p>
					</div>
				</div>

				<div class="flex-w w-full p-b-42">
					<span class="fs-18 cl5 txt-center size-211">
						<span class="lnr lnr-phone-handset"></span>
					</span>

					<div class="size-212 p-t-2">
						<span class="mtext-110 cl2">
							Lets Talk
						</span>

						<p class="stext-115 cl1 size-213 p-t-18">
							+821082302277
						</p>
					</div>
				</div>

				<div class="flex-w w-full">
					<span class="fs-18 cl5 txt-center size-211">
						<span class="lnr lnr-envelope"></span>
					</span>

					<div class="size-212 p-t-2">
						<span class="mtext-110 cl2">
							Sale Support
						</span>

						<p class="stext-115 cl1 size-213 p-t-18">
							abdulaxadjon9@gmail.com
						</p>
					</div>
				</div>
			</div>
		</div>
	</div>
</section>


<!-- Map -->
<div class="map container">
	<iframe class="container" style="border:0;"
		src="https://www.google.com/maps/embed?pb=!1m10!1m8!1m3!1d6522.421535253668!2d126.80542929348663!3d35.17629901129999!3m2!1i1024!2i768!4f13.1!5e0!3m2!1suz!2sde!4v1770816122538!5m2!1suz!2sde"
		width="600" height="450" style="border:0;" allowfullscreen="" loading="lazy"
		referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>

{% endblock main %}
